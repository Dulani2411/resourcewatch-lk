name: CD — Push to AWS ECR

on:
  push:
    branches: [ main ]

jobs:

  push-to-ecr:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/resourcewatch-backend:$IMAGE_TAG ./backend
          docker build -t $ECR_REGISTRY/resourcewatch-backend:latest ./backend
          docker push $ECR_REGISTRY/resourcewatch-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/resourcewatch-backend:latest

      - name: Build & push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/resourcewatch-frontend:$IMAGE_TAG ./frontend
          docker build -t $ECR_REGISTRY/resourcewatch-frontend:latest ./frontend
          docker push $ECR_REGISTRY/resourcewatch-frontend:$IMAGE_TAG
          docker push $ECR_REGISTRY/resourcewatch-frontend:latest