apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: resourcewatch
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'resourcewatch-backend'
        static_configs:
          - targets: ['backend-service:8080']
        metrics_path: '/actuator/prometheus'

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']