spring.application.name=resourcewatch-backend
server.port=${SPRING_PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resourcewatch}
spring.datasource.username=${DB_USERNAME:rw_user}
spring.datasource.password=${DB_PASSWORD:rw_secret_password_change_me}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always

app.cors.allowed-origins=http://localhost:5173

openweather.api-key=${OPENWEATHER_API_KEY:}
openweather.base-url=${OPENWEATHER_BASE_URL:https://api.openweathermap.org/data/2.5}
openweather.city=${OPENWEATHER_CITY:Colombo}
openweather.country-code=${OPENWEATHER_COUNTRY_CODE:LK}

ollama.host=${OLLAMA_HOST:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3}

weather.fetch.cron=0 0 */3 * * *